<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <form>
      <label for="user-input"
        >Look up the current temperature in your desired location!
      </label>
      <input type="text" id="user-input" name="user-input" />
      <input type="radio" name="temperature" id="celsius" checked="checked" />
      <label for="celsius">Celsius</label>
      <input type="radio" name="temperature" id="fahrenheit" />
      <label for="fahrenheit">Fahrenheit</label>
      <button id="search-button">Search</button>
    </form>
    <div id="loading-display"></div>
    <div id="display-container">
      <div id="temperature-and-icon"></div>
    </div>
  </body>
</html>
